{% extends "base.html" %}

{% block title %}Benutzer bearbeiten{% endblock %}

{% block content %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/admin_styles.css') }}">

<div class="admin-section">
    <h2>Benutzer bearbeiten</h2>
    <form method="POST" class="admin-form admin-form-change-password">
        <div class="form-group">
            <label for="username">Benutzername:</label>
            <input type="text" id="username" name="username" value="{{ user.username }}" required>
        </div>
        <div class="form-group">
            <label for="role">Rolle:</label>
            <select id="role" name="role" required>
                <option value="Administrator" {% if user.role == 'Administrator' %}selected{% endif %}>Administrator</option>
                <option value="Benutzer" {% if user.role == 'Benutzer' %}selected{% endif %}>Benutzer</option>
                <option value="Betrachter" {% if user.role == 'Betrachter' %}selected{% endif %}>Betrachter</option>
            </select>
        </div>
        <button type="submit" class="button button-primary">Benutzer aktualisieren</button>
    </form>
</div>
{% endblock %}
