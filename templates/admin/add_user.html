{% extends "base.html" %}

{% block title %}Neuen Benutzer hinzufügen{% endblock %}

{% block content %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/admin_styles.css') }}">

<div class="admin-section">
    <h2>Neuen Benutzer hinzufügen</h2>
    <form method="POST" class="admin-form admin-form-change-password">
        <div class="form-group">
            <label for="username">Benutzername:</label>
            <input type="text" id="username" name="username" required>
        </div>
        <div class="form-group">
            <label for="password">Passwort:</label>
            <input type="password" id="password" name="password" required>
        </div>
        <div class="form-group">
            <label for="role">Rolle:</label>
            <select id="role" name="role" required>
                <option value="Administrator">Administrator</option>
                <option value="Benutzer">Benutzer</option>
                <option value="Betrachter">Betrachter</option>
            </select>
        </div>
        <button type="submit" class="button button-primary">Benutzer hinzufügen</button>
    </form>
</div>
{% endblock %}
